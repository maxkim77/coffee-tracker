<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="커피 트래커">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>☕ 커피 트래커</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root {
  --bg: #f7f5f2;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --text: #1a1a18;
  --text2: #6b6860;
  --text3: #b0ada8;
  --accent: #2d6a4f;
  --accent-light: #d8f3dc;
  --accent-text: #1b4332;
  --border: rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overscroll-behavior: none;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* TOP BAR */
.topbar {
  background: var(--surface);
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.coffee-icon { font-size: 22px; }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: calc(var(--safe-bottom) + 90px);
}

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 10px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-val { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; font-weight: 500; }
.stat-next .stat-val { font-size: 14px; margin-top: 2px; color: var(--accent); }

/* CALENDAR CARD */
.cal-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 16px;
}
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.cal-month { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.nav-btn {
  width: 32px; height: 32px;
  background: var(--surface2);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: background .15s;
}
.nav-btn:active { background: var(--border); transform: scale(0.92); }

.dow-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 8px 10px 4px;
}
.dow-cell {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.5px;
}
.dow-cell.sun { color: #e63946; }
.dow-cell.sat { color: #457b9d; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  padding: 4px 10px 10px;
}
.day-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 4px 2px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .1s;
  position: relative;
  min-height: 44px;
}
.day-cell:active { background: var(--surface2); transform: scale(0.95); }
.day-cell.empty { cursor: default; pointer-events: none; }
.day-num {
  font-size: 13px;
  font-weight: 500;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
.day-cell.today .day-num {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}
.day-cell.has-record { background: rgba(45,106,79,0.06); }
.day-num.sun { color: #e63946; }
.day-num.sat { color: #457b9d; }

.day-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  margin-top: 2px;
  max-width: 100%;
}
.day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* MEMBERS SECTION */
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.member-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}
.member-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
}
.m-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.m-info { flex: 1; min-width: 0; }
.m-name { font-size: 14px; font-weight: 600; }
.m-stat { font-size: 11px; color: var(--text2); margin-top: 1px; }
.m-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}
.badge-next { background: var(--accent-light); color: var(--accent-text); }
.badge-count { background: var(--surface2); color: var(--text2); }
.m-del {
  width: 28px; height: 28px;
  border: none; background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  color: var(--text3);
  font-size: 14px;
  transition: all .15s;
}
.m-del:active { background: #fee2e2; color: #dc2626; }

/* BOTTOM ADD BAR */
.add-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 10px 16px calc(var(--safe-bottom) + 10px);
  display: flex;
  gap: 8px;
  z-index: 50;
}
.add-bar input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 22px;
  font-size: 14px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  outline: none;
}
.add-bar input:focus { border-color: var(--accent); }
.add-bar button {
  padding: 10px 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 22px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
}
.add-bar button:active { background: var(--accent-text); transform: scale(0.97); }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-width: 480px;
  padding: 0 0 calc(var(--safe-bottom) + 16px);
  animation: slideUp .25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header {
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 16px; font-weight: 700; }
.modal-date { font-size: 12px; color: var(--text2); margin-top: 2px; }
.modal-members { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; max-height: 50vh; overflow-y: auto; }
.modal-member-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all .15s;
}
.modal-member-row:active { transform: scale(0.98); }
.modal-member-row.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}
.check-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 11px;
  color: transparent;
}
.modal-member-row.selected .check-icon {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.modal-actions {
  display: flex;
  gap: 8px;
  padding: 0 16px;
  margin-top: 4px;
}
.btn-cancel {
  flex: 1;
  padding: 13px;
  border: 1px solid var(--border);
  background: var(--surface2);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text);
  font-weight: 500;
}
.btn-save {
  flex: 2;
  padding: 13px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  font-weight: 700;
}
.btn-save:active { background: var(--accent-text); }

/* TOAST */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 80px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #1a1a18;
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 20px;
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 8px; }
.empty-text { font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">☕ 커피 트래커</div>
      <div class="topbar-sub" id="topbarSub">멤버를 추가해 시작하세요</div>
    </div>
  </div>

  <div class="scroll-area">
    <div class="stats-row" id="statsRow" style="display:none"></div>

    <div class="cal-card">
      <div class="cal-header">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <span class="cal-month" id="calMonth"></span>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="dow-row">
        <div class="dow-cell sun">일</div>
        <div class="dow-cell">월</div>
        <div class="dow-cell">화</div>
        <div class="dow-cell">수</div>
        <div class="dow-cell">목</div>
        <div class="dow-cell">금</div>
        <div class="dow-cell sat">토</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div id="memberSection">
      <div class="section-title">멤버</div>
      <div class="member-list" id="memberList"></div>
    </div>
  </div>

  <div class="add-bar">
    <input type="text" id="nameInput" placeholder="멤버 이름 추가..." />
    <button onclick="addMember()">추가</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">커피 구매자</div>
      <div class="modal-date" id="modalDate"></div>
    </div>
    <div class="modal-members" id="modalMembers"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveModal()">저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_KEY = 'coffee-pwa-v1';
const COLORS = [
  {bg:'#d8f3dc',dot:'#2d6a4f',text:'#1b4332'},
  {bg:'#dbeafe',dot:'#2563eb',text:'#1e3a8a'},
  {bg:'#fce7f3',dot:'#db2777',text:'#831843'},
  {bg:'#fef3c7',dot:'#d97706',text:'#78350f'},
  {bg:'#ede9fe',dot:'#7c3aed',text:'#3b0764'},
  {bg:'#fee2e2',dot:'#dc2626',text:'#7f1d1d'},
  {bg:'#d1fae5',dot:'#059669',text:'#064e3b'},
  {bg:'#ffedd5',dot:'#ea580c',text:'#7c2d12'},
];

let members = [], records = {}, colorIdx = 0;
let curYear, curMonth, selDay = null;
const today = new Date();

function save() {
  localStorage.setItem(LS_KEY, JSON.stringify({ members, records, colorIdx }));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (d) { members = d.members||[]; records = d.records||{}; colorIdx = d.colorIdx||0; }
  } catch(e) {}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function init() {
  load();
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  render();
}

function addMember() {
  const inp = document.getElementById('nameInput');
  const name = inp.value.trim();
  if (!name || members.find(m => m.name === name)) { inp.value = ''; return; }
  members.push({ name, color: COLORS[colorIdx % COLORS.length], count: 0 });
  colorIdx++;
  inp.value = '';
  save(); render();
  toast(`${name} 추가됨 👋`);
}

function removeMember(i) {
  const name = members[i].name;
  if (!confirm(`${name}을(를) 삭제할까요?`)) return;
  members.splice(i, 1);
  Object.keys(records).forEach(k => {
    records[k] = records[k].filter(x => x !== i).map(x => x > i ? x - 1 : x);
    if (!records[k].length) delete records[k];
  });
  recalc(); save(); render();
  toast(`${name} 삭제됨`);
}

function recalc() {
  members.forEach(m => m.count = 0);
  Object.values(records).forEach(arr => arr.forEach(i => { if (members[i]) members[i].count++; }));
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  renderCalendar(); renderStats();
}

function render() { renderStats(); renderCalendar(); renderMembers(); }

function renderStats() {
  const row = document.getElementById('statsRow');
  const sub = document.getElementById('topbarSub');
  if (!members.length) {
    row.style.display = 'none';
    sub.textContent = '멤버를 추가해 시작하세요';
    return;
  }
  row.style.display = 'grid';
  const total = members.reduce((s,m) => s + m.count, 0);
  const next = [...members].sort((a,b) => a.count - b.count)[0];
  const thisMonth = Object.entries(records).filter(([k]) => {
    const [y,mo] = k.split('-');
    return +y === curYear && +mo === curMonth;
  }).length;
  sub.textContent = `총 ${total}번 · 이번 달 ${thisMonth}번`;
  row.innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">총 구매</div></div>
    <div class="stat-card"><div class="stat-val">${thisMonth}</div><div class="stat-lbl">이번 달</div></div>
    <div class="stat-card stat-next"><div class="stat-lbl">다음 차례</div><div class="stat-val">${next?.name||'-'}</div></div>
  `;
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  document.getElementById('calMonth').textContent = `${curYear}년 ${curMonth+1}월`;
  const first = new Date(curYear, curMonth, 1).getDay();
  const days = new Date(curYear, curMonth+1, 0).getDate();
  let html = '';
  for (let i = 0; i < first; i++) html += `<div class="day-cell empty"></div>`;
  for (let d = 1; d <= days; d++) {
    const isToday = d === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();
    const dow = (first + d - 1) % 7;
    const key = `${curYear}-${curMonth}-${d}`;
    const buyers = records[key] || [];
    const numCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    const hasCls = buyers.length ? ' has-record' : '';
    let dotsHtml = '';
    if (buyers.length) {
      dotsHtml = '<div class="day-dots">';
      buyers.slice(0,4).forEach(idx => {
        const m = members[idx];
        if (m) dotsHtml += `<div class="day-dot" style="background:${m.color.dot}"></div>`;
      });
      dotsHtml += '</div>';
    }
    html += `<div class="day-cell${isToday?' today':''}${hasCls}" onclick="openModal(${d})">
      <div class="day-num ${numCls}">${d}</div>
      ${dotsHtml}
    </div>`;
  }
  grid.innerHTML = html;
}

function renderMembers() {
  const list = document.getElementById('memberList');
  if (!members.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">☕</div><div class="empty-text">아래에서 멤버를 추가해보세요</div></div>`;
    return;
  }
  const next = [...members].sort((a,b) => a.count - b.count)[0]?.name;
  list.innerHTML = [...members].map((m, i) => `
    <div class="member-card">
      <div class="m-avatar" style="background:${m.color.bg};color:${m.color.text}">${m.name.slice(0,2)}</div>
      <div class="m-info">
        <div class="m-name">${m.name}</div>
        <div class="m-stat">총 ${m.count}번 샀어요</div>
      </div>
      <span class="m-badge ${m.name===next?'badge-next':'badge-count'}">${m.name===next?'다음 차례':m.count+'회'}</span>
      <button class="m-del" onclick="removeMember(${i})">✕</button>
    </div>
  `).join('');
}

function openModal(day) {
  if (!members.length) { toast('먼저 멤버를 추가해주세요'); return; }
  selDay = day;
  const key = `${curYear}-${curMonth}-${day}`;
  const existing = records[key] || [];
  const d = new Date(curYear, curMonth, day);
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('modalDate').textContent =
    `${curYear}년 ${curMonth+1}월 ${day}일 (${days[d.getDay()]})`;
  document.getElementById('modalMembers').innerHTML = members.map((m,i) => {
    const sel = existing.includes(i);
    return `<div class="modal-member-row ${sel?'selected':''}" onclick="toggleMember(${i})">
      <div class="m-avatar" style="background:${m.color.bg};color:${m.color.text};width:32px;height:32px;font-size:11px">${m.name.slice(0,2)}</div>
      <span style="flex:1;font-size:14px;font-weight:500">${m.name}</span>
      <span style="font-size:12px;color:var(--text2)">${m.count}회</span>
      <div class="check-icon">${sel?'✓':''}</div>
    </div>`;
  }).join('');
  window._psel = [...existing];
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function toggleMember(i) {
  const sel = window._psel;
  const idx = sel.indexOf(i);
  if (idx >= 0) sel.splice(idx,1); else sel.push(i);
  document.querySelectorAll('.modal-member-row').forEach((el,j) => {
    const s = sel.includes(j);
    el.classList.toggle('selected', s);
    el.querySelector('.check-icon').textContent = s ? '✓' : '';
  });
}

function saveModal() {
  const key = `${curYear}-${curMonth}-${selDay}`;
  const prev = records[key] || [];
  const next = window._psel;
  prev.forEach(i => { if (members[i]) members[i].count = Math.max(0, members[i].count-1); });
  next.forEach(i => { if (members[i]) members[i].count++; });
  if (next.length) records[key] = [...next]; else delete records[key];
  save(); closeModal(); render();
  toast('저장됐어요 ✓');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selDay = null;
}

document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key==='Enter') addMember(); });
document.getElementById('modalOverlay').addEventListener('click', e => {
